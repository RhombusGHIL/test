<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Viewer Proxy</title>
    <style>
        /* Make the app take up the whole screen */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
        }

        /* Top Navigation Bar */
        #nav-bar { 
            background: #2d2d2d; 
            padding: 10px; 
            display: flex; 
            gap: 10px; 
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            height: 50px;
            box-sizing: border-box;
        }

        input { 
            flex: 1; 
            padding: 8px 12px; 
            border-radius: 4px; 
            border: 1px solid #444; 
            background: #3d3d3d;
            color: white;
            outline: none;
        }

        input:focus { border-color: #007bff; }

        button { 
            padding: 8px 20px; 
            cursor: pointer; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background: #0056b3; }

        /* The "PowerPoint" style window */
        iframe { 
            width: 100%; 
            height: calc(100vh - 50px); 
            border: none; 
            background: white;
        }
    </style>
</head>
<body>

    <div id="nav-bar">
        <input type="text" id="urlInput" placeholder="Enter URL (e.g., https://www.wikipedia.org)">
        <button onclick="launchSite()">Go</button>
    </div>

    <iframe id="siteViewer" src="about:blank"></iframe>

    <script>
        function launchSite() {
            const urlInput = document.getElementById('urlInput').value;
            const viewer = document.getElementById('siteViewer');

            if (!urlInput) {
                alert("Please enter a URL first!");
                return;
            }

            // Clean up the URL if the user forgot https://
            let finalUrl = urlInput;
            if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                finalUrl = 'https://' + finalUrl;
            }

            // Send the URL through our proxy service
            // This matches the '/service' route in your server.js
            viewer.src = "/service?url=" + encodeURIComponent(finalUrl);
        }

        // Allow pressing "Enter" to trigger the button
        document.getElementById("urlInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                launchSite();
            }
        });
    </script>
</body>
</html>
